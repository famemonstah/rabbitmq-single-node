---
- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
    state: present
    update_cache: true

# ──────────────────────────────────────────────
# GPG signing keys
# ──────────────────────────────────────────────
- name: Download Team RabbitMQ signing key (for rabbitmq-server repo)
  ansible.builtin.shell:
    cmd: >
      curl -1sLf
      "https://keys.openpgp.org/vks/v1/by-fingerprint/0A9AF2115F4687BD29803A206B73A36E6026DFCA"
      | gpg --dearmor
      > /usr/share/keyrings/com.rabbitmq.team.gpg
    creates: /usr/share/keyrings/com.rabbitmq.team.gpg

- name: Download Launchpad PPA signing key (for Erlang 26)
  ansible.builtin.shell:
    cmd: >
      curl -1sLf
      "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xf77f1eda57ebb1cc"
      | gpg --dearmor
      > /usr/share/keyrings/net.launchpad.ppa.rabbitmq.erlang.gpg
    creates: /usr/share/keyrings/net.launchpad.ppa.rabbitmq.erlang.gpg

# ──────────────────────────────────────────────
# Apt sources
# ──────────────────────────────────────────────
- name: Add Erlang apt source (Launchpad – amd64 + arm64, Erlang 26)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/erlang.list
    owner: root
    group: root
    mode: "0644"
    content: |
      deb [arch=amd64,arm64 signed-by=/usr/share/keyrings/net.launchpad.ppa.rabbitmq.erlang.gpg] http://ppa.launchpad.net/rabbitmq/rabbitmq-erlang-26/ubuntu {{ ansible_facts.distribution_release }} main

- name: Add RabbitMQ server apt sources (Team RabbitMQ – _all.deb)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/rabbitmq.list
    owner: root
    group: root
    mode: "0644"
    content: |
      deb [signed-by=/usr/share/keyrings/com.rabbitmq.team.gpg] https://deb1.rabbitmq.com/rabbitmq-server/ubuntu/{{ ansible_facts.distribution_release }} {{ ansible_facts.distribution_release }} main
      deb [signed-by=/usr/share/keyrings/com.rabbitmq.team.gpg] https://deb2.rabbitmq.com/rabbitmq-server/ubuntu/{{ ansible_facts.distribution_release }} {{ ansible_facts.distribution_release }} main

# ──────────────────────────────────────────────
# Version pinning
# ──────────────────────────────────────────────
- name: Pin Erlang packages to Launchpad PPA
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/erlang
    owner: root
    group: root
    mode: "0644"
    content: |
      Package: erlang*
      Pin: origin ppa.launchpad.net
      Pin-Priority: 1001

- name: Pin RabbitMQ version
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/rabbitmq
    owner: root
    group: root
    mode: "0644"
    content: |
      Package: rabbitmq-server
      Pin: version {{ rabbitmq_version }}-1
      Pin-Priority: 1001

# ──────────────────────────────────────────────
# Install Erlang + RabbitMQ
# ──────────────────────────────────────────────
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Install Erlang packages
  ansible.builtin.apt:
    name:
      - erlang-base={{ erlang_version }}
      - erlang-asn1={{ erlang_version }}
      - erlang-crypto={{ erlang_version }}
      - erlang-eldap={{ erlang_version }}
      - erlang-ftp={{ erlang_version }}
      - erlang-inets={{ erlang_version }}
      - erlang-mnesia={{ erlang_version }}
      - erlang-os-mon={{ erlang_version }}
      - erlang-parsetools={{ erlang_version }}
      - erlang-public-key={{ erlang_version }}
      - erlang-runtime-tools={{ erlang_version }}
      - erlang-snmp={{ erlang_version }}
      - erlang-ssl={{ erlang_version }}
      - erlang-syntax-tools={{ erlang_version }}
      - erlang-tftp={{ erlang_version }}
      - erlang-tools={{ erlang_version }}
      - erlang-xmerl={{ erlang_version }}
    state: present

- name: Install RabbitMQ server
  ansible.builtin.apt:
    name: rabbitmq-server
    state: present
    allow_unauthenticated: false

