---
# RabbitMQ version to install
rabbitmq_version: "4.0.9"

# Erlang version to install
# Erlang 27.x repos (ppa1/ppa2.rabbitmq.com) are unreachable from some cloud providers
# Erlang 26.x from Launchpad is compatible with RabbitMQ 4.0.4+
erlang_version: "1:26.2.5.6-2"

# Daemon settings
rabbitmq_daemon: rabbitmq-server
rabbitmq_state: started
rabbitmq_enabled: true

# RabbitMQ management plugin
rabbitmq_plugins:
  - rabbitmq_management

# Admin user (replaces guest)
rabbitmq_admin_user: admin
rabbitmq_admin_password: "Admin@1234"

# Remove default guest user
rabbitmq_remove_guest: true

# Default vhost
rabbitmq_vhost: "/"

# Ports
rabbitmq_amqp_port: 5672
rabbitmq_management_port: 15672

# Config file location
rabbitmq_conf_dir: /etc/rabbitmq
rabbitmq_conf_file: "{{ rabbitmq_conf_dir }}/rabbitmq.conf"
